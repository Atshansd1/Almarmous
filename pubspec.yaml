name: almarmous_orders
description: Bilingual Flutter order tracking app with OCR import, dashboard, and reports.
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.1
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  pdf: ^3.12.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  syncfusion_flutter_xlsio: ^33.2.4
  url_launcher: ^6.3.2
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  package_info_plus: ^10.1.0
  cloud_functions: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoNaskhArabic-Regular.ttf
    - assets/fonts/NotoNaskhArabic-Bold.ttf
